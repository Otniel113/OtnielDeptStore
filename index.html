<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otniel Department Store</title>
    <link rel="shortcut icon" href="dept-store.ico" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container text-center">
        <!-- Language Switcher -->
        <div class="d-flex justify-content-end mb-4">
            <button id="lang-en" class="btn btn-outline-primary btn-sm me-2 active">English</button>
            <button id="lang-id" class="btn btn-outline-primary btn-sm">Indonesian</button>
        </div>

        <!-- Title and Description -->
        <h1 id="title" class="mb-2 fs-3">Welcome to Otniel Department Store!</h1>
        <p id="description" class="mb-2 fs-5">
            Here are several stores you can visit.
        </p>

        <!-- Store List Cards -->
        <div class="row justify-content-center mt-2 g-4">
            <!-- Store 1 -->
            <div class="col-12 col-md-6 mb-3">
                <a href="https://thewaroenkz.vercel.app/" target="_blank" class="card-link text-decoration-none">
                    <div class="card h-100 shadow-sm transition-hover">
                        <div class="card-body p-5 d-flex flex-column align-items-center">
                            <i class="fa-solid fa-store fa-3x mb-3 text-primary"></i>
                            <h4 class="card-title fw-bold text-dark">The Waroenkz</h4>
                            <p id="the-waroenkz" class="card-text text-secondary mt-2">You can checkout several products, know the stocks, and buy them at cashier</p>
                        </div>
                    </div>
                </a>
            </div>
            <!-- Store 2 -->
            <div class="col-12 col-md-6 mb-3">
                <a href="https://tokotniel.onrender.com/" target="_blank" class="card-link text-decoration-none">
                    <div class="card h-100 shadow-sm transition-hover">
                        <div class="card-body p-5 d-flex flex-column align-items-center">
                            <i class="fa-solid fa-wallet fa-3x mb-3 text-success"></i>
                            <h4 class="card-title fw-bold text-dark">Tokotniel</h4>
                            <p id="tokotniel" class="card-text text-secondary mt-2">You can topup currency and spend them to buy products online</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
