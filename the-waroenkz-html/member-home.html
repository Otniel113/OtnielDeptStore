<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serif POS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#FBF3D1',   // Cream
                        sidebar: '#EBE5D5',      // Slightly darker cream for contrast
                        foreground: '#0F0F0F',   // Near Black (High Contrast)
                        muted: '#525252',        // Dark Gray (High Contrast Secondary)
                        border: '#8C8C8C',       // Mid-Gray (Visible Borders)
                        card: '#FFFFFF',         // White
                        paper: '#FFFFFF',        
                        // New Accessible Gold Palette
                        gold: {
                            start: '#D4AF37',    // Metallic Gold
                            end: '#F3E5AB',      // Creamy Gold
                            dark: '#B4941F',     // Hover state
                        },
                        danger: '#991B1B',       // High contrast red
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Source Sans 3"', 'sans-serif'],
                        mono: ['"IBM Plex Mono"', 'monospace'],
                    },
                    letterSpacing: {
                        'editorial': '0.01em',
                        'caps': '0.15em',
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'elevated': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FBF3D1; color: #0F0F0F; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #cart-sidebar { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Flat Gold Colors (no gradient) */
        :root {
            --gold: #D4AF37; /* Metallic Gold */
            --gold-cream: #F3E5AB; /* Light gold/cream */
            --gold-dark: #B4941F; /* Darker gold for hover */
        }
        .btn-gold {
            background-color: var(--gold);
            color: #0F0F0F;
            border: 1px solid var(--gold-dark);
        }
        .btn-gold:hover {
            background-color: var(--gold-dark);
        }
        .btn-gold:focus-visible {
            outline: 3px solid #000000;
            outline-offset: 2px;
        }
        /* Utility fallbacks for classes referenced in markup */
        .bg-gold-start { background-color: var(--gold) !important; }
        .bg-gold-cream { background-color: var(--gold-cream) !important; }
        .bg-gold-dark { background-color: var(--gold-dark) !important; }
        .text-gold-dark { color: var(--gold-dark) !important; }

        /* Selection highlight using flat gold */
        ::selection { background: rgba(212,175,55,0.18); color: #000000; }

        /* Sold Out Texture */
        .sold-out-pattern {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #f3f4f6 10px, #f3f4f6 20px);
        }
    </style>
</head>
<body class="antialiased font-sans text-foreground h-screen flex flex-col overflow-hidden selection:bg-gold-start/30 selection:text-black">

    <!-- Top Bar -->
    <header class="h-16 border-b-2 border-border bg-sidebar flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center gap-4">
            <h1 class="font-serif text-xl md:text-2xl font-bold tracking-tight text-foreground" aria-label="Serif POS System">
                Serif<span class="text-gold-dark">.</span> POS
            </h1>
            <span class="h-6 w-0.5 bg-muted hidden md:block" aria-hidden="true"></span>
            <span class="font-mono text-sm font-semibold uppercase tracking-caps text-muted hidden md:block">Jakarta Station</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="openHistory()" class="flex items-center gap-2 font-mono text-xs font-bold uppercase tracking-caps text-muted hover:text-foreground transition-colors mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-4 md:w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="hidden md:inline">History</span>
            </button>
            
            <div class="flex items-center gap-3 pl-4 border-l-2 border-border/50">
                <div class="text-right hidden sm:block leading-tight">
                    <span class="block font-serif font-bold text-sm text-foreground">John Doe</span>
                    <span class="block font-mono text-[10px] text-muted uppercase tracking-wider">Member</span>
                </div>
                <div class="w-10 h-10 rounded-full bg-foreground text-background flex items-center justify-center font-serif font-bold text-lg border-2 border-border shadow-sm">J</div>
                
                <a href="guest.html" class="ml-2 p-2 text-muted hover:text-danger transition-colors" title="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Left Column: Menu -->
        <div class="flex-1 flex flex-col min-w-0 bg-background pb-20 md:pb-0">
            <!-- Category Filter -->
            <div class="px-6 py-4 overflow-x-auto whitespace-nowrap border-b border-border bg-sidebar shrink-0 no-scrollbar" role="tablist" aria-label="Product Categories">
                <div class="flex gap-3" id="category-filters">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- Product Grid -->
            <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-background">
                <!-- Category Description -->
                <div class="mb-6">
                    <h2 id="category-title" class="font-serif text-3xl md:text-4xl font-bold text-foreground mb-2"></h2>
                    <p id="category-desc" class="font-sans text-lg text-muted max-w-2xl"></p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6" id="product-grid">
                    <!-- Products injected via JS -->
                </div>
            </div>
        </div>

        <!-- Right Column: Receipt/Cart -->
        <aside id="cart-sidebar" class="fixed inset-0 z-50 bg-paper md:relative md:w-96 md:border-l-2 md:border-border flex flex-col shrink-0 shadow-elevated transform translate-y-full md:translate-y-0 md:inset-auto" aria-labelledby="cart-heading">
            
            <!-- Mobile Header -->
            <div class="md:hidden p-4 bg-paper border-b-2 border-border flex items-center justify-between">
                <h2 id="mobile-cart-heading" class="font-serif text-xl font-bold">Current Order</h2>
                <button onclick="toggleCart()" class="p-3 text-foreground hover:bg-sidebar rounded-md focus:ring-4 focus:ring-black outline-none" aria-label="Close Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Desktop Header -->
            <div class="hidden md:flex p-6 border-b-2 border-dashed border-border justify-between items-baseline bg-paper">
                <h2 id="cart-heading" class="font-serif text-2xl font-bold">Current Order</h2>
                <span class="font-mono text-sm font-bold text-muted" id="order-id">#001</span>
            </div>

            <!-- Cart Items -->
            <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-paper" id="cart-items" role="list">
                <!-- Injected via JS -->
            </div>

            <!-- Receipt Footer -->
            <div class="p-6 bg-sidebar border-t-2 border-border space-y-4 mt-auto">
                <div class="pt-2 flex justify-between items-baseline">
                    <span class="font-serif text-xl font-bold">Total</span>
                    <span class="font-serif text-2xl md:text-3xl font-bold text-foreground" id="total-display">Rp 0</span>
                </div>

                <button onclick="processPayment()" class="w-full h-14 btn-gold rounded-lg shadow-card flex items-center justify-center gap-2 text-lg font-bold tracking-wide transition-transform active:scale-[0.98]">
                    Process Payment
                </button>
            </div>
        </aside>

        <!-- Mobile Bottom Bar -->
        <div class="md:hidden fixed bottom-0 left-0 right-0 bg-paper border-t-2 border-border p-4 z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
            <button onclick="toggleCart()" class="w-full h-14 btn-gold rounded-lg flex items-center justify-between px-6 font-bold shadow-card active:scale-[0.98]">
                <span class="font-serif">View Order</span>
                <span class="font-mono bg-white/40 px-3 py-1 rounded text-sm text-black border border-black/10" id="mobile-cart-total">Rp 0</span>
            </button>
        </div>

    </main>

    <!-- History Modal -->
    <div id="history-modal" class="fixed inset-0 z-[60] bg-black/50 hidden items-center justify-center p-4 backdrop-blur-sm" role="dialog" aria-modal="true">
        <div class="bg-card w-full max-w-2xl max-h-[80vh] flex flex-col rounded-xl border-2 border-border shadow-elevated transform transition-all scale-100">
            <div class="p-6 border-b-2 border-border flex justify-between items-center bg-sidebar rounded-t-xl shrink-0">
                <h3 class="font-serif text-2xl font-bold">Transaction History</h3>
                <button onclick="closeHistory()" class="px-2 text-muted hover:text-foreground transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 bg-background space-y-4" id="history-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // Data with Inventory
        const categories = [
            { id: 'all', label: 'All Items', description: "All of our items across all of the categories" },
            { id: 'coffee', label: 'Coffee', description: "Our premium coffee selection" },
            { id: 'bakery', label: 'Bakery', description: "Freshly baked goods" },
            { id: 'tea', label: 'Tea', description: "A variety of teas" }
        ];

        const products = [
            { id: 1, name: "Espresso", category: "coffee", price: 25000, stock: 15 },
            { id: 2, name: "Cappuccino", category: "coffee", price: 35000, stock: 8 },
            { id: 3, name: "Pour Over", category: "coffee", price: 38000, stock: 5 },
            { id: 4, name: "Cold Brew", category: "coffee", price: 35000, stock: 12 },
            { id: 5, name: "Croissant", category: "bakery", price: 28000, stock: 0 }, 
            { id: 6, name: "Pain au Choc", category: "bakery", price: 32000, stock: 6 },
            { id: 7, name: "Almond Tart", category: "bakery", price: 40000, stock: 3 },
            { id: 8, name: "Earl Grey", category: "tea", price: 25000, stock: 20 },
            { id: 9, name: "Matcha Latte", category: "tea", price: 40000, stock: 4 },
            { id: 10, name: "Sourdough", category: "bakery", price: 45000, stock: 2 },
            { id: 11, name: "Cinnamon Roll", category: "bakery", price: 30000, stock: 8 },
            { id: 12, name: "Long Black", category: "coffee", price: 30000, stock: 15 }
        ];

        let cart = [];
        let activeCategory = 'all';
        let isCartOpen = false;

        const formatIDR = (price) => {
            return new Intl.NumberFormat('id-ID', { 
                style: 'currency', 
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(price);
        };

        const gridEl = document.getElementById('product-grid');
        const filtersEl = document.getElementById('category-filters');
        const cartEl = document.getElementById('cart-items');
        const totalEl = document.getElementById('total-display');
        const mobileTotalEl = document.getElementById('mobile-cart-total');
        const cartSidebar = document.getElementById('cart-sidebar');

        function renderFilters() {
            filtersEl.innerHTML = categories.map(cat => `
                <button 
                    role="tab"
                    aria-selected="${activeCategory === cat.id}"
                    onclick="setCategory('${cat.id}')"
                    class="px-6 py-3 rounded-full text-sm font-bold font-mono uppercase tracking-caps transition-all border-2 focus:outline-none focus:ring-4 focus:ring-black ${
                        activeCategory === cat.id 
                        ? 'bg-foreground text-background border-foreground shadow-md' 
                        : 'bg-transparent text-muted border-border hover:border-foreground hover:text-foreground'
                    }"
                >
                    ${cat.label}
                </button>
            `).join('');
        }

        function getAvailableStock(productId) {
            const product = products.find(p => p.id === productId);
            const cartItem = cart.find(i => i.id === productId);
            const inCart = cartItem ? cartItem.qty : 0;
            return product.stock - inCart;
        }

        function renderProducts() {
            const filtered = activeCategory === 'all' 
                ? products 
                : products.filter(p => p.category === activeCategory);

            gridEl.innerHTML = filtered.map(p => {
                const available = getAvailableStock(p.id);
                const isOutOfStock = available <= 0;
                
                // Using high-contrast borders and clearer visual cues for Sold Out state
                return `
                <button onclick="addToCart(${p.id})" 
                    ${isOutOfStock ? 'disabled aria-disabled="true"' : ''}
                    class="group relative flex flex-col text-left h-full rounded-xl border-2 p-5 shadow-card transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-black
                    ${isOutOfStock 
                        ? 'border-border bg-gray-100 opacity-80 cursor-not-allowed sold-out-pattern' 
                        : 'bg-card border-border hover:border-gold-dark hover:shadow-elevated active:scale-[0.98]'}"
                >
                    <div class="flex justify-between w-full mb-3">
                        <span class="font-mono text-xs font-bold text-muted uppercase tracking-caps bg-sidebar px-2 py-0.5 rounded">${p.category}</span>
                        
                        <!-- Stock Indicator: High Contrast & Bold -->
                        <span class="font-mono text-xs font-bold uppercase tracking-wide px-2 py-0.5 rounded
                            ${isOutOfStock ? 'bg-danger text-white' : 'bg-gold-start text-black'}">
                            ${isOutOfStock ? 'SOLD OUT' : `Left: ${available}`}
                        </span>
                    </div>
                    
                    <h3 class="font-serif text-xl md:text-2xl font-bold text-foreground mb-3 leading-tight
                        ${isOutOfStock ? 'line-through decoration-2 decoration-danger' : ''}">${p.name}</h3>
                    
                    <span class="font-sans font-bold text-lg text-foreground mt-auto">${formatIDR(p.price)}</span>
                </button>
            `}).join('');
        }

        function renderCart() {
            if (cart.length === 0) {
                cartEl.innerHTML = `
                    <div class="text-center py-12 text-muted opacity-80" role="alert">
                        <svg class="w-16 h-16 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        <p class="font-serif font-bold text-xl">Order is Empty</p>
                        <p class="text-sm font-semibold mt-2">Add items from the menu.</p>
                    </div>`;
            } else {
                cartEl.innerHTML = cart.map(item => `
                    <div class="flex items-center justify-between group py-2 border-b border-dashed border-border last:border-0" role="listitem">
                        <div class="flex-1 pr-4">
                            <h4 class="font-serif text-lg font-bold text-foreground">${item.name}</h4>
                            <p class="text-sm font-mono font-semibold text-muted">${formatIDR(item.price)}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center border-2 border-border rounded-lg overflow-hidden bg-background">
                                <button onclick="updateQty(${item.id}, -1)" class="w-10 h-10 flex items-center justify-center font-bold text-xl text-foreground hover:bg-sidebar focus:bg-gold-start focus:outline-none" aria-label="Decrease quantity">-</button>
                                <span class="w-10 text-center font-mono text-base font-bold text-foreground bg-white" aria-label="Quantity">${item.qty}</span>
                                <button onclick="updateQty(${item.id}, 1)" class="w-10 h-10 flex items-center justify-center font-bold text-xl text-foreground hover:bg-sidebar focus:bg-gold-start focus:outline-none" aria-label="Increase quantity">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            updateTotals();
        }

        function setCategory(id) {
            activeCategory = id;
            renderFilters();
            renderProducts();
            renderDescription();
        }

        function renderDescription() {
            const category = categories.find(c => c.id === activeCategory);
            if(category) {
                document.getElementById('category-title').innerText = category.label;
                document.getElementById('category-desc').innerText = category.description;
            }
        }

        function addToCart(id) {
            if (getAvailableStock(id) <= 0) return;

            const product = products.find(p => p.id === id);
            const existing = cart.find(i => i.id === id);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
            renderProducts(); 
        }

        function updateQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if (index === -1) return;

            if (change > 0 && getAvailableStock(id) <= 0) return;

            cart[index].qty += change;
            
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            renderCart();
            renderProducts(); 
        }

        function updateTotals() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const formattedTotal = formatIDR(total);
            totalEl.innerText = formattedTotal;
            mobileTotalEl.innerText = formattedTotal;
        }

        function toggleCart() {
            isCartOpen = !isCartOpen;
            if (isCartOpen) {
                cartSidebar.classList.remove('translate-y-full');
            } else {
                cartSidebar.classList.add('translate-y-full');
            }
        }

        function processPayment() {
            if (cart.length === 0) return;
            const btn = document.querySelector('button[onclick="processPayment()"]');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `<span class="animate-pulse">PROCESSING...</span>`;
            
            setTimeout(() => {
                btn.innerHTML = `APPROVED`;
                btn.className = "w-full h-14 bg-foreground text-background rounded-lg shadow-card flex items-center justify-center gap-2 text-lg font-bold tracking-wide";
                
                setTimeout(() => {
                    cart.forEach(item => {
                       const product = products.find(p => p.id === item.id);
                       if(product) product.stock -= item.qty;
                    });

                    // Add to History
                    const orderId = document.getElementById('order-id').innerText;
                    const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                    transactionHistory.unshift({
                        id: orderId,
                        date: new Date().toISOString().split('T')[0],
                        items: cart.map(i => ({name: i.name, qty: i.qty})),
                        total: total
                    });

                    cart = [];
                    renderCart();
                    renderProducts(); 
                    
                    if (window.innerWidth < 768 && isCartOpen) {
                        toggleCart();
                    }
                    btn.innerHTML = originalText;
                    btn.className = "w-full h-14 btn-gold rounded-lg shadow-card flex items-center justify-center gap-2 text-lg font-bold tracking-wide transition-transform active:scale-[0.98]";
                    
                    if(document.getElementById('order-id')) {
                        document.getElementById('order-id').innerText = '#' + Math.floor(Math.random() * 900 + 100);
                    }
                }, 1000);
            }, 1000);
        }

        let transactionHistory = [
            { id: '#005', date: '2023-10-25', items: [{name: 'Espresso', qty: 2}, {name: 'Croissant', qty: 1}], total: 78000 },
            { id: '#004', date: '2023-10-24', items: [{name: 'Cappuccino', qty: 1}], total: 35000 },
            { id: '#003', date: '2023-10-24', items: [{name: 'Earl Grey', qty: 1}, {name: 'Almond Tart', qty: 2}], total: 105000 }
        ];

        function openHistory() {
            const modal = document.getElementById('history-modal');
            const list = document.getElementById('history-list');
            
            list.innerHTML = transactionHistory.map(t => `
                <div class="border-2 border-border rounded-lg p-4 bg-card shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-2 border-b border-dashed border-border pb-2">
                        <div>
                            <span class="font-mono font-bold text-lg text-foreground">${t.id}</span>
                            <span class="block text-xs font-mono text-muted uppercase tracking-wide">${t.date}</span>
                        </div>
                        <span class="font-serif font-bold text-xl text-foreground">${formatIDR(t.total)}</span>
                    </div>
                    <ul class="space-y-1">
                        ${t.items.map(i => `
                            <li class="flex justify-between text-sm font-sans font-semibold text-muted">
                                <span>${i.qty}x ${i.name}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeHistory() {
            const modal = document.getElementById('history-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        renderFilters();
        renderProducts();
        renderCart();
        renderDescription();

    </script>
</body>
</html>
