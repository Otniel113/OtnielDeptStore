<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Serif POS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#FBF3D1',   // Cream
                        sidebar: '#EBE5D5',      // Slightly darker cream for contrast
                        foreground: '#0F0F0F',   // Near Black (High Contrast)
                        muted: '#525252',        // Dark Gray (High Contrast Secondary)
                        border: '#8C8C8C',       // Mid-Gray (Visible Borders)
                        card: '#FFFFFF',         // White
                        // Gold Palette
                        gold: {
                            start: '#D4AF37',    // Metallic Gold
                            end: '#F3E5AB',      // Creamy Gold
                            dark: '#B4941F',     // Hover state
                        },
                        danger: '#991B1B',       // High contrast red
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Source Sans 3"', 'sans-serif'],
                        mono: ['"IBM Plex Mono"', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        body { background-color: #FBF3D1; color: #0F0F0F; }
        .btn-gold {
            background-color: #D4AF37;
            color: #0F0F0F;
            border: 1px solid #B4941F;
        }
        .btn-gold:hover {
            background-color: #B4941F;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-sidebar border-b-2 md:border-b-0 md:border-r-2 border-border flex flex-col shrink-0">
        <div class="h-16 flex items-center justify-between px-6 border-b-2 border-border">
            <h1 class="font-serif text-xl font-bold tracking-tight text-foreground">
                Serif<span class="text-gold-dark">.</span> Admin
            </h1>
            <a href="login.html" class="md:hidden text-muted hover:text-danger hover:font-bold transition-all" aria-label="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </a>
        </div>
        
        <nav class="p-2 md:p-4 flex flex-row md:flex-col gap-2 overflow-x-auto overflow-y-hidden md:flex-1 no-scrollbar">
            <button onclick="switchTab('products')" id="tab-products" class="flex-1 md:w-full text-center md:text-left px-4 py-3 rounded-lg font-mono text-sm font-bold uppercase tracking-wider transition-colors hover:bg-background/50 focus:bg-background md:border-l-4 md:border-b-0 border-b-4 border-transparent focus:border-gold-start whitespace-nowrap">
                Products
            </button>
            <button onclick="switchTab('categories')" id="tab-categories" class="flex-1 md:w-full text-center md:text-left px-4 py-3 rounded-lg font-mono text-sm font-bold uppercase tracking-wider transition-colors hover:bg-background/50 focus:bg-background md:border-l-4 md:border-b-0 border-b-4 border-transparent focus:border-gold-start whitespace-nowrap">
                Categories
            </button>
        </nav>

        <div class="p-4 border-t-2 border-border hidden md:block">
             <a href="login.html" class="flex items-center gap-2 text-muted hover:text-danger hover:font-bold transition-all font-mono text-sm uppercase">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-background min-w-0">
        
        <!-- Header -->
        <header class="h-16 border-b-2 border-border flex items-center justify-between px-4 md:px-8 bg-background shrink-0">
            <h2 id="page-title" class="font-serif text-xl md:text-2xl font-bold">Products</h2>
            <button onclick="openModal()" class="px-3 py-2 md:px-4 md:py-2 btn-gold rounded-md font-mono text-xs md:text-sm font-bold uppercase tracking-wide shadow-sm flex items-center gap-2">
                <span>+ Add New</span>
            </button>
        </header>

        <!-- Content Base -->
        <div class="flex-1 overflow-auto p-4 md:p-8">
            <div class="bg-card border-2 border-border rounded-xl shadow-card overflow-x-auto">
                <table class="w-full text-left text-sm min-w-[600px] md:min-w-full">
                    <thead class="bg-sidebar border-b-2 border-border font-mono uppercase tracking-wider text-muted">
                        <tr>
                            <th class="px-6 py-4 font-bold">ID</th>
                            <th class="px-6 py-4 font-bold w-1/3">Name</th>
                            <th class="px-6 py-4 font-bold">Category</th> <!-- for products -->
                            <th class="px-6 py-4 font-bold text-right">Price</th> <!-- for products -->
                            <th class="px-6 py-4 font-bold text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-border/20 font-sans font-semibold">
                        <!-- JS Rendered -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Modal (Shared for Add/Edit) -->
    <div id="modal" class="fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-card w-full max-w-lg rounded-xl border-2 border-border shadow-elevated p-6 transform transition-all scale-100">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="font-serif text-2xl font-bold">Add Item</h3>
                <button onclick="closeModal()" class="text-muted hover:text-foreground">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="modal-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                
                <!-- Dynamic Fields -->
                <div id="form-fields" class="space-y-4"></div>

                <div class="flex gap-4 mt-8 pt-4 border-t border-dashed border-border">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 border-2 border-border rounded-lg font-bold hover:bg-sidebar transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 py-3 btn-gold rounded-lg font-bold shadow-sm transition-transform active:scale-[0.98]">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Mock Data (mirrors member-home.html)
        let categories = [
            { id: 'coffee', label: 'Coffee', description: "Our premium coffee selection" },
            { id: 'bakery', label: 'Bakery', description: "Freshly baked goods" },
            { id: 'tea', label: 'Tea', description: "A variety of teas" }
        ];

        let products = [
            { id: 1, name: "Espresso", category: "coffee", price: 25000, stock: 15 },
            { id: 2, name: "Cappuccino", category: "coffee", price: 35000, stock: 8 },
            { id: 3, name: "Pour Over", category: "coffee", price: 38000, stock: 5 },
            { id: 4, name: "Cold Brew", category: "coffee", price: 35000, stock: 12 },
            { id: 5, name: "Croissant", category: "bakery", price: 28000, stock: 0 }, 
            { id: 6, name: "Pain au Choc", category: "bakery", price: 32000, stock: 6 },
            { id: 7, name: "Almond Tart", category: "bakery", price: 40000, stock: 3 },
            { id: 8, name: "Earl Grey", category: "tea", price: 25000, stock: 20 },
            { id: 9, name: "Matcha Latte", category: "tea", price: 40000, stock: 4 }
        ];

        let currentTab = 'products';
        let isEditing = false;

        const tableBody = document.getElementById('table-body');
        const pageTitle = document.getElementById('page-title');
        const modal = document.getElementById('modal');
        const form = document.getElementById('modal-form');
        const formFields = document.getElementById('form-fields');

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-sidebar', 'border-gold-start'));
            document.getElementById(`tab-${tab}`).classList.add('bg-sidebar', 'border-gold-start');
            
            pageTitle.innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
            renderTable();
        }

        function renderTable() {
            tableBody.innerHTML = '';
            
            const data = currentTab === 'products' ? products : categories;

            if(currentTab === 'products') {
                // Render Product Columns
                 // Update Header first
                 document.querySelector('thead tr').innerHTML = `
                    <th class="px-6 py-4 font-bold">ID</th>
                    <th class="px-6 py-4 font-bold w-1/4">Name</th>
                    <th class="px-6 py-4 font-bold">Category</th>
                    <th class="px-6 py-4 font-bold text-right">Price</th>
                    <th class="px-6 py-4 font-bold text-right">Stock</th>
                    <th class="px-6 py-4 font-bold text-center">Actions</th>
                 `;

                 data.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-sidebar/50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-mono text-muted">#${item.id}</td>
                        <td class="px-6 py-4 font-serif text-lg text-foreground">${item.name}</td>
                        <td class="px-6 py-4">
                            <span class="bg-sidebar px-2 py-1 rounded font-mono text-xs font-bold uppercase tracking-wide">${item.category}</span>
                        </td>
                        <td class="px-6 py-4 text-right font-mono">${item.price.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right font-mono">${item.stock}</td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="editItem(${item.id})" class="p-2 text-muted hover:text-foreground hover:bg-white rounded-md border border-transparent hover:border-border transition-all">Edit</button>
                                <button onclick="deleteItem(${item.id})" class="p-2 text-danger hover:bg-danger/10 rounded-md transition-colors">Delete</button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                 });
            } else {
                // Render Category Columns
                document.querySelector('thead tr').innerHTML = `
                    <th class="px-6 py-4 font-bold">ID</th>
                    <th class="px-6 py-4 font-bold w-1/4">Label</th>
                    <th class="px-6 py-4 font-bold">Description</th>
                    <th class="px-6 py-4 font-bold text-center">Actions</th>
                 `;

                 data.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-sidebar/50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-mono text-muted">${item.id}</td>
                        <td class="px-6 py-4 font-serif text-lg text-foreground">${item.label}</td>
                        <td class="px-6 py-4 text-muted">${item.description}</td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="editItem('${item.id}')" class="p-2 text-muted hover:text-foreground hover:bg-white rounded-md border border-transparent hover:border-border transition-all">Edit</button>
                                <button onclick="deleteItem('${item.id}')" class="p-2 text-danger hover:bg-danger/10 rounded-md transition-colors">Delete</button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                 });
            }
        }

        function openModal(editId = null) {
            isEditing = !!editId;
            document.getElementById('edit-id').value = editId || '';
            document.getElementById('modal-title').innerText = isEditing ? 'Edit Item' : 'Add New Item';
            
            formFields.innerHTML = '';
            
            if (currentTab === 'products') {
                const item = isEditing ? products.find(p => p.id == editId) : {};
                
                formFields.innerHTML = `
                    <div>
                        <label class="block text-sm font-bold uppercase mb-1">Name</label>
                        <input type="text" name="name" value="${item.name || ''}" class="w-full p-3 border-2 border-border rounded bg-background" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold uppercase mb-1">Category</label>
                            <select name="category" class="w-full p-3 border-2 border-border rounded bg-background" required>
                                ${categories.map(c => `<option value="${c.id}" ${item.category === c.id ? 'selected' : ''}>${c.label}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold uppercase mb-1">Price</label>
                            <input type="number" name="price" value="${item.price || ''}" class="w-full p-3 border-2 border-border rounded bg-background" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold uppercase mb-1">Stock</label>
                        <input type="number" name="stock" value="${item.stock || ''}" class="w-full p-3 border-2 border-border rounded bg-background" required>
                    </div>
                `;
            } else {
                const item = isEditing ? categories.find(c => c.id === editId) : {};
                
                formFields.innerHTML = `
                    <div>
                        <label class="block text-sm font-bold uppercase mb-1">ID (Slug)</label>
                        <input type="text" name="id" value="${item.id || ''}" class="w-full p-3 border-2 border-border rounded bg-background" ${isEditing ? 'readonly' : ''} required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold uppercase mb-1">Label</label>
                        <input type="text" name="label" value="${item.label || ''}" class="w-full p-3 border-2 border-border rounded bg-background" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold uppercase mb-1">Description</label>
                        <textarea name="description" class="w-full p-3 border-2 border-border rounded bg-background" rows="3">${item.description || ''}</textarea>
                    </div>
                `;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            if (currentTab === 'products') {
                data.price = Number(data.price);
                data.stock = Number(data.stock);
                
                if (isEditing) {
                    const id = document.getElementById('edit-id').value;
                    const index = products.findIndex(p => p.id == id);
                    if (index !== -1) {
                         products[index] = { ...products[index], ...data };
                    }
                } else {
                    const newId = Math.max(...products.map(p => p.id), 0) + 1;
                    products.push({ id: newId, ...data });
                }
            } else {
                if (isEditing) {
                    const id = document.getElementById('edit-id').value;
                    const index = categories.findIndex(c => c.id === id);
                    if (index !== -1) {
                        categories[index] = { ...categories[index], ...data };
                    }
                } else {
                    if (categories.some(c => c.id === data.id)) {
                        alert('ID already exists');
                        return;
                    }
                    categories.push(data);
                }
            }

            closeModal();
            renderTable();
        }

        function editItem(id) {
            openModal(id);
        }

        function deleteItem(id) {
            if(!confirm('Are you sure you want to delete this item?')) return;
            
            if(currentTab === 'products') {
                products = products.filter(p => p.id != id);
            } else {
                categories = categories.filter(c => c.id !== id);
            }
            renderTable();
        }

        // Initialize
        switchTab('products');

    </script>
</body>
</html>
